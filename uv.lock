    { name = "torch", version = "2.12.1", source = { registry = "https://download.pytorch.org/whl/cpu" }, marker = "(sys_platform == 'darwin' and extra != 'extra-11-ai-composer-certora-cli-beta-mirror' and extra == 'extra-11-ai-composer-cpu') or (sys_platform == 'darwin' and extra != 'extra-11-ai-composer-certora-cli' and extra != 'extra-11-ai-composer-certora-cli-beta' and extra == 'extra-11-ai-composer-cpu') or (extra == 'extra-11-ai-composer-cpu' and extra == 'extra-11-ai-composer-cuda') or (extra == 'extra-11-ai-composer-certora-cli' and extra == 'extra-11-ai-composer-certora-cli-beta') or (extra == 'extra-11-ai-composer-certora-cli' and extra == 'extra-11-ai-composer-certora-cli-beta-mirror') or (extra == 'extra-11-ai-composer-certora-cli-beta' and extra == 'extra-11-ai-composer-certora-cli-beta-mirror')" },
    { name = "torch", version = "2.12.1+cpu", source = { registry = "https://download.pytorch.org/whl/cpu" }, marker = "(sys_platform != 'darwin' and extra != 'extra-11-ai-composer-certora-cli-beta-mirror' and extra == 'extra-11-ai-composer-cpu') or (sys_platform != 'darwin' and extra != 'extra-11-ai-composer-certora-cli' and extra != 'extra-11-ai-composer-certora-cli-beta' and extra == 'extra-11-ai-composer-cpu') or (extra == 'extra-11-ai-composer-certora-cli' and extra == 'extra-11-ai-composer-certora-cli-beta') or (extra == 'extra-11-ai-composer-certora-cli' and extra == 'extra-11-ai-composer-certora-cli-beta-mirror') or (extra == 'extra-11-ai-composer-certora-cli-beta' and extra == 'extra-11-ai-composer-certora-cli-beta-mirror') or (extra == 'extra-11-ai-composer-cpu' and extra == 'extra-11-ai-composer-cuda')" },
]
